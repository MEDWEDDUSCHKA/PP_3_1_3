<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin panel</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .top-navbar {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 180px;
            background-color: #fff;
            padding-top: 0;
        }
        .sidebar .nav-link {
            color: #333;
            padding: 12px 20px;
            border-radius: 0;
            display: block;
            text-decoration: none;
        }
        .sidebar .nav-link.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            margin-left: 180px;
            margin-top: 56px;
            padding: 30px;
            background-color: #f8f9fa;
            min-height: calc(100vh - 56px);
        }
        .nav-tabs .nav-link {
            color: #007bff;
        }
        .nav-tabs .nav-link.active {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-navbar">
        <div>
            <span th:text="${currentUser != null ? currentUser.email : 'admin@mail.ru'}">admin@mail.ru</span>
            <span> with roles: </span>
            <span th:if="${currentUser != null}">
                <span th:each="role, iterStat : ${currentUser.roles}">
                    <span th:text="${role.name}">ADMIN</span>
                    <span th:if="${!iterStat.last}"> </span>
                </span>
            </span>
            <span th:if="${currentUser == null}">ADMIN USER</span>
        </div>
        <div>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-dark btn-sm">Logout</button>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="/admin" class="nav-link active" sec:authorize="hasRole('ADMIN')">Admin</a>
        <a href="/user" class="nav-link">User</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2>Admin panel</h2>
        
        <!-- Tabs -->
        <ul class="nav nav-tabs mt-4" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="users-tab" data-bs-toggle="tab" 
                        data-bs-target="#users" type="button" role="tab">
                    Users table
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" 
                        data-bs-target="#new-user" type="button" role="tab">
                    New User
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content border border-top-0 p-3 bg-white" id="adminTabsContent">
            <!-- Users Table Tab -->
            <div class="tab-pane fade show active" id="users" role="tabpanel">
                <h5>All users</h5>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">2</td>
                            <td th:text="${user.firstName}">admin</td>
                            <td th:text="${user.lastName}">admin</td>
                            <td th:text="${user.age}">35</td>
                            <td th:text="${user.email}">admin@mail.ru</td>
                            <td>
                                <span th:each="role : ${user.roles}" 
                                      th:text="${role.name} + ' '">ADMIN USER</span>
                            </td>
                            <td>
                                <button type="button" class="btn btn-info btn-sm text-white" 
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#editModal' + ${user.id}">
                                    Edit
                                </button>
                            </td>
                            <td>
                                <button type="button" class="btn btn-danger btn-sm" 
                                        data-bs-toggle="modal" 
                                        th:data-bs-target="'#deleteModal' + ${user.id}">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Edit Modal for each user -->
                <div th:each="user : ${users}">
                    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Edit user</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <form th:action="@{/admin/update}" method="post">
                                    <div class="modal-body">
                                        <input type="hidden" name="id" th:value="${user.id}">
                                        <input type="hidden" name="username" th:value="${user.username}">
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">ID</label>
                                            <input type="text" class="form-control" th:value="${user.id}" readonly>
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">First name</label>
                                            <input type="text" class="form-control" name="firstName" 
                                                   th:value="${user.firstName}" required>
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">Last name</label>
                                            <input type="text" class="form-control" name="lastName" 
                                                   th:value="${user.lastName}" required>
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">Age</label>
                                            <input type="number" class="form-control" name="age" 
                                                   th:value="${user.age}" required>
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">Email</label>
                                            <input type="email" class="form-control" name="email" 
                                                   th:value="${user.email}" required>
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">Password</label>
                                            <input type="password" class="form-control" name="password" 
                                                   placeholder="Leave blank to keep current">
                                        </div>
                                        
                                        <div class="mb-3 text-center">
                                            <label class="form-label fw-bold">Role</label>
                                            <select class="form-select" name="roleIds" multiple size="2" required>
                                                <option th:each="role : ${allRoles}" 
                                                        th:value="${role.id}" 
                                                        th:text="${role.name}"
                                                        th:selected="${user.roles.contains(role)}">
                                                    ADMIN
                                                </option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                        <button type="submit" class="btn btn-primary">Edit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Delete Modal for each user -->
                <div th:each="user : ${users}">
                    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Delete user</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">ID</label>
                                        <input type="text" class="form-control" th:value="${user.id}" readonly>
                                    </div>
                                    
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">First name</label>
                                        <input type="text" class="form-control" th:value="${user.firstName}" readonly>
                                    </div>
                                    
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Last name</label>
                                        <input type="text" class="form-control" th:value="${user.lastName}" readonly>
                                    </div>
                                    
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Age</label>
                                        <input type="text" class="form-control" th:value="${user.age}" readonly>
                                    </div>
                                    
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Email</label>
                                        <input type="text" class="form-control" th:value="${user.email}" readonly>
                                    </div>
                                    
                                    <div class="mb-3 text-center">
                                        <label class="form-label fw-bold">Role</label>
                                        <select class="form-select" multiple size="2" disabled>
                                            <option th:each="role : ${user.roles}" 
                                                    th:text="${role.name}" selected>
                                                ADMIN
                                            </option>
                                        </select>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <a th:href="@{/admin/delete/{id}(id=${user.id})}" class="btn btn-danger">Delete</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New User Tab -->
            <div class="tab-pane fade" id="new-user" role="tabpanel">
                <h5>Add new user</h5>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form th:action="@{/admin}" method="post">
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">First name</label>
                                <input type="text" class="form-control" name="firstName" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Last name</label>
                                <input type="text" class="form-control" name="lastName" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Age</label>
                                <input type="number" class="form-control" name="age" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold">Role</label>
                                <select class="form-select" name="roleIds" multiple size="2" required>
                                    <option th:each="role : ${allRoles}" 
                                            th:value="${role.id}" 
                                            th:text="${role.name}">
                                        ADMIN
                                    </option>
                                </select>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-success">Add new user</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
